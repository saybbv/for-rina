<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для Рины ❤️</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="background"></div>

<div class="hearts"></div>

<div class="container">

    <img src="photo.jpg" class="photo">

    <h1>Привет, солнышко ❤️</h1>

    <p class="text">
        Есть кое-что, что я давно хотел тебе сказать...
    </p>

    <button id="nextBtn">
        Открыть письмо 💌
    </button>

</div>

<div id="letter" class="hidden">

<div class="card">

<h2>🌹 Рина, сходим на свидание?</h2>

<p>

📅 <b>3 сентября</b><br><br>

🕗 <b>20:00</b><br><br>

🍽️ <b>Ресторан</b>

</p>

<div class="buttons">

<button id="yes">
Да ❤️
</button>

<button id="no">
Нет 🙈
</button>

</div>

</div>

</div>

<div id="success" class="hidden">

<h1>❤️</h1>

<h2>

Спасибо, Рина!

</h2>

<p>

Я очень рад,

что ты согласилась.

<br><br>

До встречи

<b>3 сентября в 20:00</b>

<br><br>

🌹

<br>

— Сай

</p>

</div>

<script src="script.js"></script>

</body>
</html>
